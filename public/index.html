<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0d0f14" />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        width: 100%;
        height: 100%;
        height: -webkit-fill-available;
        background: #0d0f14;
        overflow: hidden;
        position: fixed;
      }
      body {
        width: 100%;
        height: 100%;
        height: -webkit-fill-available;
        background: #0d0f14;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
      }
      #root {
        width: 100%;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0d0f14;
      }
    </style>
    <title>🎤 Lyrics</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
